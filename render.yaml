services:
  - type: web
    name: security_automation
    runtime: python
    region: singapore
    plan: free
    pythonVersion: "3.11.9"

    buildCommand: pip install -r requirements.txt && bash scripts/install_tools.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_MAX_TOKENS
        value: "1000"
      - key: AI_MAX_FINDINGS_PER_CALL
        value: "10"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"